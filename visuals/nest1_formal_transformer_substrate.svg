<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1040" viewBox="0 0 1500 1040" role="img" aria-labelledby="title desc">
  <title id="title">Nest 1 formal and transformer substrate visual summary</title>
  <desc id="desc">Plain English map of Nest 1 layers, current evidence, and open transformer-internal gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="48%" stop-color="#101112"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9bd7ff"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(255,255,255,0.045); stroke: rgba(255,255,255,0.22); stroke-width: 1.5; }
      .panel-strong { fill: rgba(255,255,255,0.075); stroke: rgba(255,255,255,0.55); stroke-width: 2; }
      .line { stroke: rgba(255,255,255,0.18); stroke-width: 2; }
      .line-strong { stroke: rgba(155,215,255,0.55); stroke-width: 3; }
      .title { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 44px; }
      .subtitle { fill: #d6d6d6; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 21px; }
      .smallcaps { fill: #a9a9a9; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 13px; letter-spacing: 4px; }
      .label { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 750; font-size: 21px; }
      .body { fill: #dddddd; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 17px; }
      .body-dim { fill: #b9b9b9; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 15px; }
      .chip { fill: rgba(155,215,255,0.18); stroke: rgba(155,215,255,0.5); stroke-width: 1; }
      .chip-warn { fill: rgba(255,216,117,0.16); stroke: rgba(255,216,117,0.55); stroke-width: 1; }
      .chip-open { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.30); stroke-width: 1; }
      .chiptext { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
      .axis { fill: #9bd7ff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 2px; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="1040"/>
  <g opacity="0.20">
    <path d="M90 170 C 310 40, 510 310, 760 160 S 1170 60, 1410 220" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M70 760 C 320 540, 520 910, 760 690 S 1160 550, 1420 820" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 520 H1500" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M750 0 V1040" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>

  <text x="70" y="80" class="smallcaps">NEST 1 VISUAL SUMMARY</text>
  <text x="70" y="132" class="title">Formal Systems Become Transformer Evidence</text>
  <text x="70" y="171" class="subtitle">Nest 1 starts where machine learning starts: linear algebra, tensors, probability, optimization, graphs, dynamics, and control.</text>

  <rect x="70" y="220" width="360" height="150" rx="22" class="panel-strong"/>
  <text x="100" y="262" class="smallcaps">PLAIN ENGLISH</text>
  <text x="100" y="302" class="label">What Nest 1 asks</text>
  <text x="100" y="334" class="body">Can the same pattern be found in</text>
  <text x="100" y="360" class="body">the actual math objects used by AI?</text>

  <rect x="570" y="220" width="360" height="150" rx="22" class="panel-strong"/>
  <text x="600" y="262" class="smallcaps">CURRENT READ</text>
  <text x="600" y="302" class="label">Evidence foundation exists</text>
  <text x="600" y="334" class="body">Several lanes are supported by real</text>
  <text x="600" y="360" class="body">V7, V8, quantum, and hardware data.</text>

  <rect x="1070" y="220" width="360" height="150" rx="22" class="panel-strong"/>
  <text x="1100" y="262" class="smallcaps">BOUNDARY</text>
  <text x="1100" y="302" class="label">Not every lane is closed</text>
  <text x="1100" y="334" class="body">Topology separation did not appear;</text>
  <text x="1100" y="360" class="body">attention/MLP exports are next.</text>

  <line x1="430" y1="295" x2="570" y2="295" class="line-strong"/>
  <line x1="930" y1="295" x2="1070" y2="295" class="line-strong"/>

  <text x="80" y="430" class="axis">LANE</text>
  <text x="370" y="430" class="axis">WHAT IT MEANS</text>
  <text x="850" y="430" class="axis">WHAT WE FOUND</text>
  <text x="1200" y="430" class="axis">NEXT GATE</text>

  <g transform="translate(70 455)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Geometry / Tensor</text>
    <text x="300" y="32" class="body">Where hidden states land in feature space.</text>
    <text x="780" y="32" class="body">V8 residual geometry, deltas, and subspaces are supported.</text>
    <rect x="1130" y="22" width="155" height="30" rx="15" class="chip"/>
    <text x="1150" y="42" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 545)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Stability / Statistics</text>
    <text x="300" y="32" class="body">Do reruns stay stable above chance?</text>
    <text x="780" y="32" class="body">Phase 2 and rerun matrices show real stability discipline.</text>
    <rect x="1130" y="22" width="155" height="30" rx="15" class="chip"/>
    <text x="1150" y="42" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 635)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Topography / Control</text>
    <text x="300" y="32" class="body">Where anchors, transitions, and mode changes localize.</text>
    <text x="780" y="32" class="body">Phase 4/5 localization and CTRL-1 staged traces are supported.</text>
    <rect x="1130" y="22" width="155" height="30" rx="15" class="chip"/>
    <text x="1150" y="42" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 725)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Topology</text>
    <text x="300" y="32" class="body">Does the hidden-state point cloud change connected shape?</text>
    <text x="780" y="32" class="body">Current result: topology is preserved; separation is not shown.</text>
    <rect x="1130" y="22" width="185" height="30" rx="15" class="chip-warn"/>
    <text x="1150" y="42" class="chiptext">BOUNDARY FOUND</text>
  </g>

  <g transform="translate(70 815)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Graph / Routing</text>
    <text x="300" y="32" class="body">What pathways connect tokens, layers, anchors, and outputs?</text>
    <text x="780" y="32" class="body">GRAPH-1 supported; GRAPH-2 needs measured attention-flow labels.</text>
    <rect x="1130" y="22" width="210" height="30" rx="15" class="chip-open"/>
    <text x="1150" y="42" class="chiptext">ATTENTION NEXT</text>
  </g>

  <g transform="translate(70 905)">
    <rect width="1360" height="78" rx="18" class="panel"/>
    <text x="24" y="34" class="label">Attention / MLP</text>
    <text x="300" y="32" class="body">Attention routes context; MLP updates features after routing.</text>
    <text x="780" y="32" class="body">Protocol locked, but exports are not yet collected or scored.</text>
    <rect x="1130" y="22" width="210" height="30" rx="15" class="chip-open"/>
    <text x="1150" y="42" class="chiptext">MISSING LINK</text>
  </g>
</svg>
