<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1040" viewBox="0 0 1500 1040" role="img" aria-labelledby="title desc">
  <title id="title">Nest 2 structured matter real-data gates visual summary</title>
  <desc id="desc">Plain English map of Nest 2 structured matter datasets, results, and boundaries.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="45%" stop-color="#11130f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg2); }
      .panel { fill: rgba(255,255,255,0.045); stroke: rgba(255,255,255,0.23); stroke-width: 1.5; }
      .panel-strong { fill: rgba(255,255,255,0.075); stroke: rgba(255,255,255,0.55); stroke-width: 2; }
      .line { stroke: rgba(255,255,255,0.16); stroke-width: 2; }
      .line-strong { stroke: rgba(173,255,198,0.55); stroke-width: 3; }
      .title { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 44px; }
      .subtitle { fill: #d6d6d6; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 21px; }
      .smallcaps { fill: #a9a9a9; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 13px; letter-spacing: 4px; }
      .label { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 750; font-size: 21px; }
      .body { fill: #dddddd; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 17px; }
      .body-dim { fill: #b9b9b9; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-size: 15px; }
      .chip { fill: rgba(173,255,198,0.16); stroke: rgba(173,255,198,0.55); stroke-width: 1; }
      .chip-warn { fill: rgba(255,216,117,0.16); stroke: rgba(255,216,117,0.55); stroke-width: 1; }
      .chiptext { fill: #ffffff; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
      .axis { fill: #adffc6; font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 2px; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="1040"/>
  <g opacity="0.18">
    <path d="M110 230 C 300 110, 485 255, 650 200 S 1010 90, 1370 255" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M80 830 C 335 610, 560 900, 795 745 S 1110 640, 1425 860" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 520 H1500" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M750 0 V1040" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>

  <text x="70" y="80" class="smallcaps">NEST 2 VISUAL SUMMARY</text>
  <text x="70" y="132" class="title">Structured Matter Moves From Map To Real Data</text>
  <text x="70" y="171" class="subtitle">Nest 2 asks whether the same comparator spine can be grounded in molecules, pathways, PFAS reactions, and materials data.</text>

  <rect x="70" y="220" width="410" height="150" rx="22" class="panel-strong"/>
  <text x="100" y="262" class="smallcaps">PLAIN ENGLISH</text>
  <text x="100" y="302" class="label">What Nest 2 asks</text>
  <text x="100" y="334" class="body">Can structured matter be scored with</text>
  <text x="100" y="360" class="body">the same state / relation / drift logic?</text>

  <rect x="545" y="220" width="410" height="150" rx="22" class="panel-strong"/>
  <text x="575" y="262" class="smallcaps">CURRENT READ</text>
  <text x="575" y="302" class="label">Real data support now exists</text>
  <text x="575" y="334" class="body">Molecule properties, PFAS pathways,</text>
  <text x="575" y="360" class="body">and materials stability beat controls.</text>

  <rect x="1020" y="220" width="410" height="150" rx="22" class="panel-strong"/>
  <text x="1050" y="262" class="smallcaps">BOUNDARY</text>
  <text x="1050" y="302" class="label">Still bounded, not chemistry solved</text>
  <text x="1050" y="334" class="body">Allostery mapper labels and PFAS safe</text>
  <text x="1050" y="360" class="body">mineralization remain future gates.</text>

  <line x1="480" y1="295" x2="545" y2="295" class="line-strong"/>
  <line x1="955" y1="295" x2="1020" y2="295" class="line-strong"/>

  <text x="80" y="430" class="axis">GATE</text>
  <text x="290" y="430" class="axis">REAL DATA USED</text>
  <text x="700" y="430" class="axis">FINDING</text>
  <text x="1135" y="430" class="axis">CLAIM STATUS</text>

  <g transform="translate(70 455)">
    <rect width="1360" height="88" rx="18" class="panel"/>
    <text x="24" y="35" class="label">Nest 2C</text>
    <text x="220" y="34" class="body">ESOL, Lipophilicity, FreeSolv, QM9 alpha</text>
    <text x="630" y="34" class="body">Repeated molecule-property signal above shuffled controls.</text>
    <text x="630" y="61" class="body-dim">All four datasets reached p 0.0002 in the repeated pass.</text>
    <rect x="1110" y="29" width="155" height="30" rx="15" class="chip"/>
    <text x="1130" y="49" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 560)">
    <rect width="1360" height="88" rx="18" class="panel"/>
    <text x="24" y="35" class="label">Nest 2D</text>
    <text x="220" y="34" class="body">AlloBench SI benchmark table</text>
    <text x="630" y="34" class="body">100 PDB rows extracted as a real allostery benchmark surface.</text>
    <text x="630" y="61" class="body-dim">Mirror mapper still needs contact / pocket graph labels.</text>
    <rect x="1110" y="29" width="205" height="30" rx="15" class="chip-warn"/>
    <text x="1130" y="49" class="chiptext">SURFACE FOUND</text>
  </g>

  <g transform="translate(70 665)">
    <rect width="1360" height="88" rx="18" class="panel"/>
    <text x="24" y="35" class="label">Nest 2E</text>
    <text x="220" y="34" class="body">EPA PFAS reaction library</text>
    <text x="630" y="34" class="body">184 real parent/product rows beat shuffled pathway controls.</text>
    <text x="630" y="61" class="body-dim">p 0.000200 twice; retained fluorination stays a boundary.</text>
    <rect x="1110" y="29" width="155" height="30" rx="15" class="chip"/>
    <text x="1130" y="49" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 770)">
    <rect width="1360" height="88" rx="18" class="panel"/>
    <text x="24" y="35" class="label">Nest 2F</text>
    <text x="220" y="34" class="body">Matbench / Materials Project formation energy</text>
    <text x="630" y="34" class="body">50,000 DFT rows: material descriptors recover stability signal.</text>
    <text x="630" y="61" class="body-dim">Pearson about 0.5689, p 0.000999 in both runs.</text>
    <rect x="1110" y="29" width="155" height="30" rx="15" class="chip"/>
    <text x="1130" y="49" class="chiptext">SUPPORTED</text>
  </g>

  <g transform="translate(70 875)">
    <rect width="1360" height="88" rx="18" class="panel"/>
    <text x="24" y="35" class="label">Nest 2G</text>
    <text x="220" y="34" class="body">RDKit multifeature train/test baselines</text>
    <text x="630" y="34" class="body">Molecule-property lane survives stronger held-out baselines.</text>
    <text x="630" y="61" class="body-dim">All four datasets supported at p 0.000999.</text>
    <rect x="1110" y="29" width="155" height="30" rx="15" class="chip"/>
    <text x="1130" y="49" class="chiptext">SUPPORTED</text>
  </g>

  <text x="70" y="1000" class="body-dim">Plain boundary: this grounds structured-matter lanes in real data. It does not claim all chemistry, all materials, PFAS remediation, or completed allostery mapping.</text>
</svg>
